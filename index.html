<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChadBot AI</title>  <script src="https://cdn.tailwindcss.com"></script>  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>  <style>
    body {
      overflow: hidden;
      transition: 0.3s;
    }

    .message-animation {
      animation: fade 0.3s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0px);
      }
    }

    .glass {
      backdrop-filter: blur(10px);
    }
  </style></head>
<body class="bg-[#212121] text-white"><div class="flex h-screen">  <!-- SIDEBAR -->  <div class="w-72 bg-[#171717] border-r border-gray-800 flex flex-col"><div class="p-4 border-b border-gray-800 flex items-center gap-3">
  <img
    src="https://i.imgur.com/Tq7Xb1T.png"
    class="w-12 h-12 rounded-full"
  />

  <div>
    <h1 class="text-xl font-bold">ChadBot</h1>
    <p class="text-xs text-gray-400">Sigma AI Assistant</p>
  </div>
</div>

<button
  onclick="newChat()"
  class="m-4 bg-white text-black py-3 rounded-xl font-semibold hover:scale-105 transition"
>
  + New Chat
</button>

<div class="px-4 pb-2 text-gray-400 text-sm">
  MODELS
</div>

<div class="px-4 space-y-2 overflow-auto">

  <button onclick="setModel('openai/gpt-4o-mini')" class="w-full text-left p-3 rounded-xl bg-[#2b2b2b] hover:bg-[#3b3b3b]">
    GPT-4o Mini
  </button>

  <button onclick="setModel('deepseek/deepseek-r1')" class="w-full text-left p-3 rounded-xl bg-[#2b2b2b] hover:bg-[#3b3b3b]">
    DeepSeek R1
  </button>

  <button onclick="setModel('google/gemini-2.5-flash')" class="w-full text-left p-3 rounded-xl bg-[#2b2b2b] hover:bg-[#3b3b3b]">
    Gemini Flash
  </button>

  <button onclick="setModel('meta-llama/llama-3.3-70b-instruct')" class="w-full text-left p-3 rounded-xl bg-[#2b2b2b] hover:bg-[#3b3b3b]">
    Llama 3.3
  </button>

</div>

<div class="mt-auto p-4 border-t border-gray-800">
  <button
    onclick="openSettings()"
    class="w-full bg-[#2b2b2b] p-3 rounded-xl hover:bg-[#3b3b3b]"
  >
    ⚙ Settings
  </button>
</div>

  </div>  <!-- MAIN -->  <div class="flex-1 flex flex-col"><!-- HEADER -->
<div class="h-16 border-b border-gray-800 flex items-center justify-between px-6 bg-[#171717]">
  <h1 class="font-bold text-xl">ChadBot AI</h1>

  <div class="flex items-center gap-3">
    <div id="currentModel" class="text-sm text-gray-400">
      GPT-4o Mini
    </div>
  </div>
</div>


<!-- CHAT -->
<div
  id="chatContainer"
  class="flex-1 overflow-auto p-6 space-y-6"
>

  <div class="message-animation flex gap-4">
    <img
      src="https://i.imgur.com/Tq7Xb1T.png"
      class="w-10 h-10 rounded-full"
    />

    <div class="bg-[#2b2b2b] p-4 rounded-2xl max-w-3xl">
      <p>
        Hello Sigma 👑<br><br>
        I am ChadBot AI.
        
        I can:
        <br>
        • Generate code
        <br>
        • Generate images
        <br>
        • Execute apps
        <br>
        • Build websites
        <br>
        • Solve coding problems
      </p>
    </div>
  </div>

</div>


<!-- INPUT -->
<div class="p-4 border-t border-gray-800 bg-[#171717]">

  <div class="flex gap-3 items-end">

    <textarea
      id="promptInput"
      placeholder="Ask ChadBot anything..."
      class="flex-1 bg-[#2b2b2b] rounded-2xl p-4 outline-none resize-none h-16"
    ></textarea>

    <button
      onclick="sendMessage()"
      class="bg-white text-black px-6 py-4 rounded-2xl font-bold hover:scale-105 transition"
    >
      Send
    </button>

  </div>

</div>

  </div></div><!-- SETTINGS MODAL --><div
  id="settingsModal"
  class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50"
>  <div class="bg-[#1e1e1e] w-[500px] rounded-3xl p-8 glass border border-gray-700"><div class="flex justify-between items-center mb-6">
  <h2 class="text-2xl font-bold">Settings</h2>

  <button onclick="closeSettings()" class="text-2xl">
    ✕
  </button>
</div>

<div class="space-y-6">

  <div>
    <h3 class="font-semibold mb-3">Theme</h3>

    <div class="grid grid-cols-3 gap-3">

      <button onclick="changeTheme('dark')" class="bg-black p-3 rounded-xl">
        Dark
      </button>

      <button onclick="changeTheme('orange')" class="bg-orange-500 p-3 rounded-xl">
        Orange
      </button>

      <button onclick="changeTheme('blue')" class="bg-blue-500 p-3 rounded-xl">
        Blue
      </button>

    </div>
  </div>


  <div>
    <h3 class="font-semibold mb-3">OpenRouter API Key</h3>

    <input
      id="apiKey"
      type="password"
      placeholder="sk-or-v1-..."
      class="w-full bg-[#2b2b2b] p-3 rounded-xl outline-none"
    />
  </div>


  <div>
    <h3 class="font-semibold mb-3">HuggingFace API Key</h3>

    <input
      id="hfKey"
      type="password"
      placeholder="hf_xxxxxxxxx"
      class="w-full bg-[#2b2b2b] p-3 rounded-xl outline-none"
    />
  </div>


  <button
    onclick="saveSettings()"
    class="w-full bg-white text-black py-4 rounded-xl font-bold"
  >
    Save Settings
  </button>

</div>

  </div></div><script>

let currentModel = 'openai/gpt-4o-mini'
let apiKey = ''
let hfKey = ''


function setModel(model) {
  currentModel = model

  document.getElementById('currentModel').innerText = model
}


function openSettings() {
  document.getElementById('settingsModal').classList.remove('hidden')
}

function closeSettings() {
  document.getElementById('settingsModal').classList.add('hidden')
}


function saveSettings() {
  apiKey = document.getElementById('apiKey').value
  hfKey = document.getElementById('hfKey').value

  localStorage.setItem('openrouter', apiKey)
  localStorage.setItem('hf', hfKey)

  alert('Settings Saved!')

  closeSettings()
}


function changeTheme(theme) {

  if (theme === 'dark') {
    document.body.className = 'bg-[#212121] text-white'
  }

  if (theme === 'orange') {
    document.body.className = 'bg-orange-950 text-orange-100'
  }

  if (theme === 'blue') {
    document.body.className = 'bg-blue-950 text-blue-100'
  }
}


function newChat() {
  document.getElementById('chatContainer').innerHTML = ''
}


function addMessage(role, content) {

  const container = document.getElementById('chatContainer')

  const div = document.createElement('div')

  div.className = 'message-animation flex gap-4'

  div.innerHTML = `

    <img
      src="${role === 'user'
        ? 'https://cdn-icons-png.flaticon.com/512/9131/9131529.png'
        : 'https://i.imgur.com/Tq7Xb1T.png'}"
      class="w-10 h-10 rounded-full"
    />

    <div class="bg-[#2b2b2b] p-4 rounded-2xl max-w-3xl overflow-auto">
      ${marked.parse(content)}
    </div>

  `

  container.appendChild(div)

  container.scrollTop = container.scrollHeight
}


async function sendMessage() {

  const input = document.getElementById('promptInput')

  const prompt = input.value.trim()

  if (!prompt) return

  addMessage('user', prompt)

  input.value = ''


  if (
    prompt.toLowerCase().includes('website') ||
    prompt.toLowerCase().includes('app') ||
    prompt.toLowerCase().includes('code')
  ) {

    addMessage(
      'assistant',
      `## Before coding please answer:\n\n1. Framework?\n- React\n- Next.js\n- HTML/CSS\n\n2. Theme style?\n- Dark\n- Light\n- Cyberpunk\n\n3. Mobile responsive?\n- Yes\n- No`
    )

    return
  }


  if (
    prompt.toLowerCase().includes('image') ||
    prompt.toLowerCase().includes('wallpaper') ||
    prompt.toLowerCase().includes('art')
  ) {

    addMessage(
      'assistant',
      `## Before generating image answer:\n\n1. Style?\n- Anime\n- Realistic\n- Cinematic\n\n2. Resolution?\n- 1024x1024\n- 1920x1080\n\n3. Lighting?\n- Dark\n- Neon\n- Sunset`
    )

    return
  }


  addMessage('assistant', 'Thinking...')


  try {

    const response = await fetch(
      'https://openrouter.ai/api/v1/chat/completions',
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${localStorage.getItem('openrouter')}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: currentModel,
          messages: [
            {
              role: 'system',
              content: `

You are ChadBot AI.

You are a sigma-level coding assistant.

You are extremely good at:
- Coding
- Building websites
- Debugging
- AI Engineering
- Modern UI

Always provide modern code.
Always optimize code.
Always explain clearly.

`
            },
            {
              role: 'user',
              content: prompt
            }
          ]
        })
      }
    )


    const data = await response.json()

    document.getElementById('chatContainer').lastChild.remove()


    let reply = data.choices?.[0]?.message?.content || 'No response'


    if (reply.includes('```')) {

      reply += `

---

<button onclick="openSandbox()" style="padding:12px 20px;border:none;border-radius:12px;background:white;color:black;font-weight:bold;cursor:pointer;">
Run Code Sandbox
</button>
`
    }


    addMessage('assistant', reply)

  } catch (error) {

    document.getElementById('chatContainer').lastChild.remove()

    addMessage('assistant', 'Error: ' + error.message)
  }
}


function openSandbox() {
  window.open('https://stackblitz.com/', '_blank')
}


window.onload = () => {

  const saved = localStorage.getItem('openrouter')
  const hf = localStorage.getItem('hf')

  if (saved) {
    document.getElementById('apiKey').value = saved
  }

  if (hf) {
    document.getElementById('hfKey').value = hf
  }
}

</script></body>
  </html>
